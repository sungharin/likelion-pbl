<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>자기소개 페이지</title>

    <!-- 외부 CSS 연결 (필수) -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- 🔹 헤더 (시맨틱 태그) -->
    <header>
        <h1>My Profile</h1>
    </header>

    <!-- 🔹 메인 -->
    <main>

        <!-- 🔹 프로필 카드 -->
        <section class="profile-card">

            <!-- ✔ 프로필 이미지 -->
            <img src="images/profile.jpg" alt="프로필 이미지">

            <!-- ✔ 기본 정보 -->
            <div class="profile-info">
                <h2>성하린</h2>
                <p class="part">프론트엔드</p>
                <p class="intro">사용자 경험을 중요하게 생각하는 개발자입니다.</p>
            </div>

        </section>

        <!-- 🔹 상세 정보 -->
        <section class="details">

            <!-- 자기소개 -->
            <div class="box">
                <h3>자기소개</h3>
                <p>
                    웹 개발에 큰 흥미를 가지고 있으며, 사용자 중심의 인터페이스를 만드는 것을 목표로 공부하고 있습니다.
                </p>
            </div>

            <!-- 관심 기술 -->
            <div class="box">
                <h3>관심 기술</h3>
                <ul>
                    <li>HTML</li>
                    <li>CSS</li>
                    <li>JavaScript</li>
                    <li>React</li>
                </ul>
            </div>

            <!-- 연락처 -->
            <div class="box">
                <h3>연락처</h3>
                <p>010-3622-0186</p>
            </div>

        </section>

    </main>

    <!-- 🔹 푸터 -->
    <footer>
        <p>© 2026 My Portfolio</p>
    </footer>

</body>
</html>
